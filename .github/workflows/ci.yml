---
name: CI

on:
  pull_request:
    paths:
      - "**/*.sh"
      - "Makefile"
      - ".shellcheckrc"
      - "action.yaml"
  workflow_dispatch:

jobs:
  lint:
    timeout-minutes: ${{ fromJSON(vars.GHA_DEFAULT_TIMEOUT) }}
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: make lint

  functional:
    timeout-minutes: ${{ fromJSON(vars.GHA_DEFAULT_TIMEOUT) }}
    name: Functional Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./
        with:
          op-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
